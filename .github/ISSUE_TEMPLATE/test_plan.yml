name: Test Plan Submission
description: Submit your team's test plan for the QuickWallet application.
title: "[TEST PLAN] Team <your team name>"
labels: ["test-plan"]
body:

  - type: textarea
    id: attachment
    attributes:
      label: Test Plan Document
      description: |
        Attach your test plan document by dragging and dropping the file into this field.
        Any format is accepted — PDF, Word, Excel, Markdown, etc.
      placeholder: "Drag and drop your file here."
    validations:
      required: true
